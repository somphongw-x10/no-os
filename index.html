<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>no-os.com — เปรียบเทียบอุปกรณ์ WFH สเปคคุ้มราคา ซื้อ Shopee ถูกกว่า</title>
<meta name="description" content="เปรียบเทียบอุปกรณ์ Work From Home สเปคคุ้มราคา เมาส์ คีย์บอร์ด หูฟัง จัด Setup ซื้อผ่าน Shopee ถูกกว่า มีคูปองลด">
<link rel="canonical" href="https://pick.no-os.com/">
<meta property="og:title" content="no-os.com — เปรียบเทียบอุปกรณ์ WFH สเปคคุ้มราคา">
<meta property="og:description" content="เปรียบเทียบอุปกรณ์ Work From Home สเปคคุ้มราคา ซื้อผ่าน Shopee ถูกกว่า">
<meta property="og:url" content="https://pick.no-os.com/">
<meta property="og:type" content="website">
<meta name="robots" content="index, follow">
<style>
  :root{
    --charcoal:#111111; --dark-grey:#484848; --white:#FFFFFF;
    --bg-secondary:#F5F5F5; --border-subtle:#DFDFDF; --border-medium:#CCCCCC;
    --accent-teal:#AADDDD; --accent-red:#CC0008; --accent-yellow:#FFEB3B;
    --s4:4px; --s8:8px; --s12:12px; --s16:16px; --s20:20px;
    --s24:24px; --s32:32px; --s40:40px; --s48:48px; --s64:64px;
    --r-badge:2px; --r-card:4px; --r-pill:64px;
    --maxw:1024px;
    --font:'Noto Sans Thai',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:var(--font);color:var(--charcoal);background:var(--white);line-height:1.5;-webkit-font-smoothing:antialiased;}
  .wrap{max-width:var(--maxw);margin:0 auto;padding:0 var(--s20);}

  /* Topbar */
  .topbar{border-bottom:1px solid var(--border-subtle);}
  .topbar .wrap{display:flex;align-items:center;justify-content:space-between;height:56px;}
  .logo{font-weight:700;font-size:18px;letter-spacing:-0.5px;text-decoration:none;color:var(--charcoal);}
  .logo span{color:var(--dark-grey);font-weight:400;}
  .nav a{font-size:14px;color:var(--dark-grey);text-decoration:none;margin-left:var(--s24);}
  .nav a:hover{color:var(--charcoal);}

  /* Hero */
  .hero{background:var(--charcoal);color:var(--white);padding:var(--s48) 0;}
  .hero h1{font-size:40px;font-weight:700;line-height:1.25;letter-spacing:-0.5px;}
  .hero p{font-size:18px;color:#aaa;margin-top:var(--s16);max-width:600px;}
  .hero .tag{display:inline-block;background:var(--accent-yellow);color:var(--charcoal);
    font-size:12px;font-weight:700;padding:var(--s4) var(--s12);border-radius:var(--r-badge);
    margin-bottom:var(--s16);}

  /* Category filter */
  .cats{padding:var(--s32) 0 var(--s16);}
  .cats .wrap{display:flex;gap:var(--s8);flex-wrap:wrap;}
  .cat-btn{
    background:var(--bg-secondary);border:0;border-radius:var(--r-pill);
    padding:var(--s8) var(--s20);font-size:14px;font-family:var(--font);
    cursor:pointer;color:var(--dark-grey);transition:all .15s;
  }
  .cat-btn:hover,.cat-btn.active{background:var(--charcoal);color:var(--white);}

  /* Article grid */
  .articles{padding:var(--s16) 0 var(--s64);}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:var(--s24);}

  .acard{
    background:var(--bg-secondary);border-radius:var(--r-card);
    overflow:hidden;text-decoration:none;color:inherit;
    transition:box-shadow .15s,background .15s;display:block;
  }
  .acard:hover{background:var(--white);box-shadow:0 2px 8px rgba(0,0,0,0.08);}
  .acard-img{
    width:100%;height:180px;object-fit:contain;
    background:var(--white);padding:var(--s20);display:block;
  }
  .acard-img-placeholder{
    width:100%;height:180px;background:var(--border-subtle);
    display:flex;align-items:center;justify-content:center;color:var(--border-medium);
  }
  .acard-body{padding:var(--s16);}
  .acard-cat{font-size:12px;font-weight:700;color:var(--dark-grey);margin-bottom:var(--s8);}
  .acard-title{font-size:16px;font-weight:700;line-height:1.4;margin-bottom:var(--s8);}
  .acard-desc{font-size:13px;color:var(--dark-grey);line-height:1.5;margin-bottom:var(--s12);}
  .acard-footer{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--border-medium);}
  .acard-cta{font-size:13px;font-weight:700;color:var(--charcoal);}

  /* Empty state */
  .empty{text-align:center;padding:var(--s64);color:var(--dark-grey);}

  footer{background:var(--charcoal);color:var(--white);padding:var(--s40) 0;margin-top:var(--s40);font-size:14px;}
  footer a{color:var(--white);}

  @media(max-width:768px){
    .hero h1{font-size:28px;}
    .grid{grid-template-columns:repeat(2,1fr);}
  }
  @media(max-width:480px){
    .hero h1{font-size:24px;}
    .grid{grid-template-columns:1fr;}
    .nav{display:none;}
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="wrap">
    <a class="logo" href="/">no-os<span>.com</span></a>
    <nav class="nav">
      <a href="/?cat=เมาส์">เมาส์</a>
      <a href="/?cat=คีย์บอร์ด">คีย์บอร์ด</a>
      <a href="/?cat=หูฟัง">หูฟัง</a>
      <a href="/?cat=จัด Setup">จัด Setup</a>
    </nav>
  </div>
</div>

<!-- Hero -->
<section class="hero">
  <div class="wrap">
    <span class="tag">อุปกรณ์ WFH</span>
    <h1>เปรียบเทียบสเปคจริง<br>ซื้อ Shopee ถูกกว่า</h1>
    <p>รวมอุปกรณ์ Work From Home คุ้มราคา เราเปรียบเทียบให้ คุณแค่กดซื้อ</p>
  </div>
</section>

<!-- Category filter -->
<div class="cats">
  <div class="wrap" id="cat-filter"></div>
</div>

<!-- Article grid -->
<div class="articles">
  <div class="wrap">
    <div class="grid" id="article-grid"></div>
  </div>
</div>

<footer>
  <div class="wrap">
    no-os.com — เปรียบเทียบอุปกรณ์ WFH สเปคคุ้มราคา &nbsp;·&nbsp;
    <a href="#">เกี่ยวกับเรา</a> &nbsp;·&nbsp;
    <a href="#">นโยบาย affiliate</a>
  </div>
</footer>

<script>
async function loadArticles() {
  const res = await fetch('articles.json');
  const articles = await res.json();

  // Get active category from URL
  const params = new URLSearchParams(location.search);
  const activeCat = params.get('cat') || 'ทั้งหมด';

  // Build category list
  const cats = ['ทั้งหมด', ...new Set(articles.map(a => a.category))];
  const catWrap = document.getElementById('cat-filter');
  cats.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn' + (cat === activeCat ? ' active' : '');
    btn.textContent = cat;
    btn.onclick = () => {
      if (cat === 'ทั้งหมด') {
        location.href = '/';
      } else {
        location.href = `/?cat=${encodeURIComponent(cat)}`;
      }
    };
    catWrap.appendChild(btn);
  });

  // Filter articles
  const filtered = activeCat === 'ทั้งหมด'
    ? articles
    : articles.filter(a => a.category === activeCat);

  // Render grid
  const grid = document.getElementById('article-grid');
  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty">ยังไม่มีบทความในหมวดนี้ครับ</div>';
    return;
  }

  filtered.forEach(a => {
    const card = document.createElement('a');
    card.className = 'acard';
    card.href = `article.html?data=${a.data}`;

    const imgHtml = a.image
      ? `<img class="acard-img" src="${a.image}" alt="${a.title}" loading="lazy" onerror="this.style.display='none'">`
      : `<div class="acard-img-placeholder">
           <svg width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
             <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
             <path d="m21 15-5-5L5 21"/>
           </svg>
         </div>`;

    card.innerHTML = `
      ${imgHtml}
      <div class="acard-body">
        <div class="acard-cat">${a.category}</div>
        <div class="acard-title">${a.title}</div>
        <div class="acard-desc">${a.description}</div>
        <div class="acard-footer">
          <span>อัปเดต ${a.updatedDate}</span>
          <span class="acard-cta">อ่านเพิ่มเติม →</span>
        </div>
      </div>`;

    grid.appendChild(card);
  });
}

loadArticles().catch(() => {
  document.getElementById('article-grid').innerHTML =
    '<div class="empty">โหลดบทความไม่ได้ กรุณาลองใหม่</div>';
});
</script>

</body>
</html>
